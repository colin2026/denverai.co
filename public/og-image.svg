<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Peach block bottom -->
  <rect x="0" y="440" width="1200" height="190" fill="#FAE3D5"/>

  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="1200" height="8" fill="#FF6B35"/>

  <!-- Decorative blob 1 -->
  <ellipse cx="1080" cy="180" rx="260" ry="220" fill="#FF6B35" opacity="0.08" transform="rotate(-15 1080 180)"/>

  <!-- Decorative blob 2 -->
  <ellipse cx="120" cy="520" rx="180" ry="140" fill="#FFD60A" opacity="0.12" transform="rotate(20 120 520)"/>

  <!-- Denver badge -->
  <rect x="80" y="80" width="190" height="38" rx="19" fill="#FFF3EE" stroke="#FFD4C2" stroke-width="1.5"/>
  <text x="175" y="104" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="13" font-weight="700" fill="#FF6B35" text-anchor="middle" letter-spacing="1.5">DENVER, COLORADO</text>

  <!-- Main headline -->
  <text x="80" y="220" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="88" font-weight="800" fill="#1C1C1E" letter-spacing="-3">Business AI,</text>
  <text x="80" y="320" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="88" font-weight="800" fill="#FF6B35" letter-spacing="-3">done right.</text>

  <!-- Subline -->
  <text x="80" y="400" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="26" font-weight="400" fill="#555555">We help Denver businesses save time, reply faster, and win more business.</text>

  <!-- Bottom brand -->
  <text x="80" y="560" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="32" font-weight="800" fill="#1C1C1E" letter-spacing="-1">Denver AI</text>
  <text x="80" y="595" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="18" font-weight="400" fill="#888">denverai.co</text>

  <!-- Orange dot accent -->
  <circle cx="1100" cy="560" r="48" fill="#FF6B35"/>
  <text x="1100" y="573" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">AI</text>
</svg>
